<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar ADS-B Real - Multitela</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d0e11;
            color: #10b981;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        header {
            width: 100%;
            text-align: center;
            margin-bottom: 15px;
        }
        h1 {
            font-size: clamp(1.2rem, 4vw, 1.8rem); /* Ajusta o tamanho da fonte com base na tela */
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #radarWrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 550px; /* Limite máximo para não ficar gigante no Desktop */
            margin: auto;
        }
        #radarContainer {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1; /* Mantém o container sempre um quadrado perfeito */
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.2);
            background: radial-gradient(circle, #0f172a 0%, #020617 100%);
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }
        footer {
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
            text-align: center;
        }
        #apiStatus {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            font-weight: bold;
            margin-bottom: 8px;
        }
        #flightListContainer {
            width: 100%;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 4px;
            padding: 8px;
        }
        .status {
            color: #64748b;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            white-space: nowrap;
            display: inline-block;
            animation: marquee 25s linear infinite; /* Efeito letreiro corrido se houver muitos voos */
        }
        
        /* Animação de letreiro para mobile não quebrar a linha */
        @keyframes marquee {
            0% { transform: translate3d(50%, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Live Air Traffic Radar</h1>
    </header>

    <div id="radarWrapper">
        <div id="radarContainer">
            <canvas id="radarCanvas"></canvas>
        </div>
    </div>

    <footer>
        <div id="apiStatus">Iniciando sistema...</div>
        <div id="flightListContainer">
            <div id="flightList" class="status">Aguardando primeira varredura...</div>
        </div>
    </footer>

    <script>
        // CONFIGURAÇÃO DA API AIRLABS
        const AIRLABS_API_KEY = "55baabb7-0d55-4dc0-ad79-da0f76f2be96"; // <-- Insira sua chave da AirLabs aqui
        
        const canvas = document.getElementById('radarCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('radarContainer');

        let width, height, centerX, centerY, maxRadius;

        // Função crucial: Ajusta a resolução interna do Canvas para nunca pixelar na tela
        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            // Define o tamanho real de renderização baseado no tamanho do layout CSS
            canvas.width = rect.width;
            canvas.height = rect.height;
            
            width = canvas.width;
            height = canvas.height;
            centerX = width / 2;
            centerY = height / 2;
            maxRadius = width / 2;
        }

        // Configurações geográficas dinâmicas
        let myLat = -29.1714; 
        let myLon = -51.5186;
        let myCityName = "BG";
        let radarRangeKm = 120; 
        let locationDetected = false;

        let airplanes = [];
        let sweepAngle = 0;

        const regionalCities = [
            { name: "BG", lat: -29.1714, lon: -51.5186 },
            { name: "CXS", lat: -29.1681, lon: -51.1794 },
            { name: "FAR", lat: -29.2244, lon: -51.3467 },
            { name: "GAR", lat: -29.2558, lon: -51.5350 },
            { name: "VNP", lat: -28.9361, lon: -51.5531 },
            { name: "POA", lat: -30.0346, lon: -51.2177 },
            { name: "FLN", lat: -27.5954, lon: -48.5480 },
            { name: "CWB", lat: -25.4290, lon: -49.2671 },
            { name: "SPO", lat: -23.5505, lon: -46.6333 },
            { name: "CPQ", lat: -22.9056, lon: -47.0608 },
            { name: "RIO", lat: -22.9068, lon: -43.1729 },
            { name: "BHZ", lat: -19.9167, lon: -43.9345 },
            { name: "VIX", lat: -20.3155, lon: -40.3128 },
            { name: "BSB", lat: -15.7942, lon: -47.8822 },
            { name: "GYN", lat: -16.6869, lon: -49.2648 },
            { name: "SSA", lat: -12.9714, lon: -38.5014 },
            { name: "REC", lat: -8.0543, lon: -34.8813 },
            { name: "FOR", lat: -3.7319, lon: -38.5267 },
            { name: "MAO", lat: -3.1190, lon: -60.0217 },
            { name: "BEL", lat: -1.4558, lon: -48.4902 },
            { name: "CGB", lat: -15.6014, lon: -56.0979 }
        ];

        async function detectLocationByIP() {
            try {
                document.getElementById('apiStatus').innerText = "Sintonizando localização atual...";
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                if (data.latitude && data.longitude) {
                    myLat = data.latitude;
                    myLon = data.longitude;
                    myCityName = data.city ? data.city.substring(0, 3).toUpperCase() : "LOC";
                }
            } catch (e) {
                console.error(e);
            } finally {
                locationDetected = true;
            }
        }

                async function fetchLiveFlightData() {
            try {
                if (!locationDetected) {
                    await detectLocationByIP();
                }

                document.getElementById('apiStatus').innerText = "Varrendo espaço aéreo...";

                const url = `https://airlabs.co/api/v9/flights?api_key=${AIRLABS_API_KEY}&lat=${myLat}&lng=${myLon}&distance=${radarRangeKm}`;
                const response = await fetch(url);
                const apiData = await response.json();
                airplanes = [];

                if (apiData && apiData.response && apiData.response.length > 0) {
                    apiData.response.forEach(flight => {
                        if (flight.lat && flight.lng) {
                            const callsign = flight.flight_icao || flight.reg_number || 'UNK';
                            const distance = haversineDistance(myLat, myLon, flight.lat, flight.lng);
                            const bearing = calculateBearing(myLat, myLon, flight.lat, flight.lng);
                            const altitudeFeet = flight.alt || 0;
                            const heading = flight.dir || 0;

                            if (distance <= radarRangeKm) {
                                airplanes.push({ callsign, distance, bearing, altitude: altitudeFeet, heading });
                            }
                        }
                    });
                    document.getElementById('apiStatus').innerText = `Radar Ativo - ${airplanes.length} alvos detectados`;
                    updateFlightListText();
                } else {
                    document.getElementById('apiStatus').innerText = "Radar Ativo - Sem tráfego no momento";
                    document.getElementById('flightList').innerText = "Nenhum voo detectado no raio de 80km.";
                    document.getElementById('flightList').style.animation = "none"; // Desativa letreiro se não houver dados
                }
            } catch (error) {
                console.error(error);
                document.getElementById('apiStatus').innerText = "Erro ao conectar com o serviço de tráfego";
            }
        }

        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) - Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        function updateFlightListText() {
            if (airplanes.length === 0) return;
            const textoLista = airplanes.map(a => `${a.callsign} (${Math.round(a.distance)}km)`).join('  |  ');
            document.getElementById('flightList').innerText = textoLista;
            document.getElementById('flightList').style.animation = "marquee 25s linear infinite"; // Ativa o letreiro corrido
        }

        function drawRadar() {
            // Limpa a tela aplicando o efeito de rastro
            ctx.fillStyle = 'rgba(2, 6, 23, 0.12)';
            ctx.fillRect(0, 0, width, height);

            // Escala fontes com base na proporção dinâmica do tamanho do canvas atual
            const baseFontSize = Math.max(8, width / 36); 
            const titleFontSize = baseFontSize + 2;

            // Anéis concêntricos do radar
            ctx.strokeStyle = 'rgba(16, 185, 129, 0.15)';
            ctx.lineWidth = 1;
            for (let r = maxRadius / 4; r <= maxRadius; r += maxRadius / 4) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = 'rgba(16, 185, 129, 0.5)';
                ctx.font = `${Math.round(baseFontSize - 1)}px Courier New`;
                ctx.fillText(`${Math.round((r / maxRadius) * radarRangeKm)}km`, centerX + 6, centerY - r + baseFontSize + 2);
            }

            // Linhas de eixos centrais
            ctx.beginPath();
            ctx.moveTo(centerX, 0); ctx.lineTo(centerX, height);
            ctx.moveTo(0, centerY); ctx.lineTo(width, centerY);
            ctx.stroke();

            // DESENHO DAS CIDADES
            regionalCities.forEach(city => {
                const distance = haversineDistance(myLat, myLon, city.lat, city.lon);
                const bearing = calculateBearing(myLat, myLon, city.lat, city.lon);

                if (distance <= radarRangeKm) {
                    const rPixel = (distance / radarRangeKm) * maxRadius;
                    const angleRad = (bearing - 90) * Math.PI / 180;
                    const x = centerX + rPixel * Math.cos(angleRad);
                    const y = centerY + rPixel * Math.sin(angleRad);

                    const sizeFactor = width / 400; // Multiplicador para os elementos não sumirem em telas pequenas

                    if (distance < 2) {
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(x - (3 * sizeFactor), y - (3 * sizeFactor), 6 * sizeFactor, 6 * sizeFactor);
                        ctx.font = `bold ${Math.round(titleFontSize)}px Courier New`;
                        ctx.fillText(`BASE (${myCityName})`, x + (8 * sizeFactor), y - (5 * sizeFactor));
                    } else {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                        ctx.fillRect(x - (2 * sizeFactor), y - (2 * sizeFactor), 4 * sizeFactor, 4 * sizeFactor);

                        ctx.font = `bold ${Math.round(baseFontSize)}px Courier New`;
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                        ctx.fillText(city.name, x + (6 * sizeFactor), y + (4 * sizeFactor));
                    }
                }
            });

            // DESENHO DOS AVIÕES
            airplanes.forEach(plane => {
                const rPixel = (plane.distance / radarRangeKm) * maxRadius;
                const angleRad = (plane.bearing - 90) * Math.PI / 180;
                const x = centerX + rPixel * Math.cos(angleRad);
                const y = centerY + rPixel * Math.sin(angleRad);

                const sizeFactor = width / 400;

                ctx.fillStyle = '#22c55e';
                ctx.shadowColor = '#22c55e';
                ctx.shadowBlur = 8 * sizeFactor;
                ctx.beginPath();
                ctx.arc(x, y, 5 * sizeFactor, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#4ade80';
                ctx.font = `bold ${Math.round(titleFontSize)}px Courier New`;
                ctx.fillText(plane.callsign, x + (10 * sizeFactor), y - (3 * sizeFactor));
                ctx.fillStyle = '#10b981';
                ctx.font = `bold ${Math.round(baseFontSize)}px Courier New`;
                ctx.fillText(`${plane.altitude}ft`, x + (10 * sizeFactor), y + (9 * sizeFactor));

                const headingRad = (plane.heading - 90) * Math.PI / 180;
                ctx.strokeStyle = 'rgba(34, 197, 94, 0.7)';
                ctx.lineWidth = 1.5 * sizeFactor;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + (15 * sizeFactor) * Math.cos(headingRad), y + (15 * sizeFactor) * Math.sin(headingRad));
                ctx.stroke();
            });

            // Linha de Varredura
            ctx.strokeStyle = 'rgba(16, 185, 129, 0.35)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX + maxRadius * Math.cos(sweepAngle), centerY + maxRadius * Math.sin(sweepAngle));
            ctx.stroke();

            sweepAngle += 0.012;
            if (sweepAngle > Math.PI * 2) sweepAngle = 0;

            requestAnimationFrame(drawRadar);
        }

        // Executa o ajuste de tamanho inicial e adiciona o ouvinte para rotação de tela/redimensionamento
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Inicialização dos loops de dados
        fetchLiveFlightData();
        setInterval(fetchLiveFlightData, 30000);

        drawRadar();
    </script>
</body>
</html>
