<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar ADS-B Real - Versão Estável</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0d0e11;
            color: #10b981;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        header {
            width: 100%;
            text-align: center;
            margin-bottom: 15px;
        }
        h1 {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #radarWrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 550px;
            margin: auto;
        }
        #radarContainer {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.2);
            background: radial-gradient(circle, #0f172a 0%, #020617 100%);
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }
        footer {
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
            text-align: center;
        }
        #apiStatus {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            font-weight: bold;
            margin-bottom: 8px;
        }
        #flightListContainer {
            width: 100%;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 4px;
            padding: 8px;
        }
        .status {
            color: #64748b;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            white-space: nowrap;
            display: inline-block;
        }
    </style>
</head>
<body>

    <header>
        <h1>Live Air Traffic Radar</h1>
    </header>

    <div id="radarWrapper">
        <div id="radarContainer">
            <canvas id="radarCanvas"></canvas>
        </div>
    </div>

    <footer>
        <div id="apiStatus">Iniciando sistema...</div>
        <div id="flightListContainer">
            <div id="flightList" class="status">Aguardando primeira varredura...</div>
        </div>
    </footer>

    <script>
        const canvas = document.getElementById('radarCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('radarContainer');

        let width, height, centerX, centerY, maxRadius;

        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            width = canvas.width;
            height = canvas.height;
            centerX = width / 2;
            centerY = height / 2;
            maxRadius = width / 2;
        }

        // Centro definitivo do Radar estável (Bento Gonçalves - RS)
        const myLat = -29.1714; 
        const myLon = -51.5186;
        const myCityName = "BG";
        const radarRangeKm = 120; // Mantido em 120km conforme o seu código anterior

        let airplanes = [];             // Lista de aviões visíveis estáveis na tela
        let dadosNovosDaInternet = [];  // Fila de espera que recebe dados do Worker
        let sweepAngle = 0;

        // Lista de cidades estratégicas para pontos de referência em solo
        const regionalCities = [
            { name: "BG", lat: -29.1714, lon: -51.5186 },
            { name: "CXS", lat: -29.1681, lon: -51.1794 },
            { name: "GAR", lat: -29.2558, lon: -51.5350 },
            { name: "VNP", lat: -28.9361, lon: -51.5531 },
            { name: "POA", lat: -30.0346, lon: -51.2177 },
            { name: "FLN", lat: -27.5954, lon: -48.5480 },
            { name: "CWB", lat: -25.4290, lon: -49.2671 },
            { name: "SPO", lat: -23.5505, lon: -46.6333 },
            { name: "CPQ", lat: -22.9056, lon: -47.0608 },
            { name: "RIO", lat: -22.9068, lon: -43.1729 }
        ];

        // Função de captura direta via feed público do Flightradar24
        async function fetchLiveFlightData() {
            try {
                document.getElementById('apiStatus').innerText = "Varrendo espaço aéreo local...";

                // Caixa de busca ao redor da Serra Gaúcha
                const bounds = {
                    minLat: myLat - 1.2,
                    maxLat: myLat + 1.2,
                    minLon: myLon - 1.2,
                    maxLon: myLon + 1.2
                };

                // A URL oficial do SEU worker com SSL ativo
                const seuWorkerUrl = "https://meu-proxy-radar.clmgomes.workers.dev/"; 
                
                const urlFinal = `${seuWorkerUrl}?bounds=${bounds.maxLat},${bounds.minLat},${bounds.minLon},${bounds.maxLon}&faa=1&satellite=1&mlat=1&flarm=1&adsb=1&gnd=0&air=1&vehicles=0&estimated=1&maxage=14400&gliders=0&stats=0&_nocache=${Date.now()}`;

                const response = await fetch(urlFinal);
                if (!response.ok) throw new Error("Servidor Cloudflare ocupado");
                
                const data = await response.json();
                
                // Criamos um array temporário para não limpar o sincronismo bruscamente
                let novosVoos = []; 

                if (data) {
                    Object.keys(data).forEach(key => {
                        if (Array.isArray(data[key])) {
                            const flight = data[key];
                            const lat = flight[1];
                            const lon = flight[2];

                            if (lat && lon) {
                                const distance = haversineDistance(myLat, myLon, lat, lon);

                                if (distance <= radarRangeKm) {
                                    const callsign = flight[16] || flight[13] || 'UNK';
                                    const bearing = calculateBearing(myLat, myLon, lat, lon);
                                    const altitudeFeet = flight[4] || 0;
                                    const heading = flight[3] || 0;

                                    novosVoos.push({ callsign, distance, bearing, altitude: altitudeFeet, heading });
                                }
                            }
                        }
                    });

                    // Atualiza a fila de espera em segundo plano de uma vez só
                    dadosNovosDaInternet = novosVoos;
                    document.getElementById('apiStatus').innerText = `Radar Ativo - ${dadosNovosDaInternet.length} alvos detectados`;
                }
            } catch (error) {
                console.error("Erro no canal privado:", error);
                document.getElementById('apiStatus').innerText = "Reconectando ao feed privado...";
            }
        }

        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) - Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        function updateFlightListText() {
            if (airplanes.length === 0) {
                document.getElementById('flightList').innerText = "Nenhum voo detectado no raio de 120km.";
                return;
            }
            const textoLista = airplanes.map(a => `${a.callsign} (${Math.round(a.distance)}km)`).join('  |  ');
            document.getElementById('flightList').innerText = textoLista;
        }

        function drawRadar() {
            // Efeito Phosphor Decay (Rastro analógico)
            ctx.fillStyle = 'rgba(2, 6, 23, 0.12)';
            ctx.fillRect(0, 0, width, height);

            const baseFontSize = Math.max(8, width / 36); 
            const titleFontSize = baseFontSize + 2;
            const sizeFactor = width / 400;

            // Linhas de anéis concêntricos
            ctx.strokeStyle = 'rgba(16, 185, 129, 0.15)';
            ctx.lineWidth = 1;
            for (let r = maxRadius / 4; r <= maxRadius; r += maxRadius / 4) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = 'rgba(16, 185, 129, 0.5)';
                ctx.font = `${Math.round(baseFontSize - 1)}px Courier New`;
                ctx.fillText(`${Math.round((r / maxRadius) * radarRangeKm)}km`, centerX + 6, centerY - r + baseFontSize + 2);
            }

            ctx.beginPath();
            ctx.moveTo(centerX, 0); ctx.lineTo(centerX, height);
            ctx.moveTo(0, centerY); ctx.lineTo(width, centerY);
            ctx.stroke();

            // DESENHO DAS CIDADES (Branco fosco)
            regionalCities.forEach(city => {
                const distance = haversineDistance(myLat, myLon, city.lat, city.lon);
                const bearing = calculateBearing(myLat, myLon, city.lat, city.lon);

                if (distance <= radarRangeKm) {
                    const rPixel = (distance / radarRangeKm) * maxRadius;
                    const angleRad = (bearing - 90) * Math.PI / 180;
                    const x = centerX + rPixel * Math.cos(angleRad);
                    const y = centerY + rPixel * Math.sin(angleRad);

                    if (distance < 2) {
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(x - (3 * sizeFactor), y - (3 * sizeFactor), 6 * sizeFactor, 6 * sizeFactor);
                        ctx.font = `bold ${Math.round(titleFontSize)}px Courier New`;
                        ctx.fillText(`BASE (${myCityName})`, x + (8 * sizeFactor), y - (5 * sizeFactor));
                    } else {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                        ctx.fillRect(x - (2 * sizeFactor), y - (2 * sizeFactor), 4 * sizeFactor, 4 * sizeFactor);

                        ctx.font = `bold ${Math.round(baseFontSize)}px Courier New`;
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                        ctx.fillText(city.name, x + (6 * sizeFactor), y + (4 * sizeFactor));
                    }
                }
            });

            // Converte o ângulo do feixe de radianos para graus (0 a 360)
            let currentSweepGrade = (sweepAngle * 180 / Math.PI + 90) % 360;

            // -----------------------------------------------------------------
            // LÓGICA DE SINCRONISMO REAL: ATUALIZA SÓ NA PASSAGEM DA LINHA
            // -----------------------------------------------------------------
            dadosNovosDaInternet.forEach(dadoFresco => {
                let aviaoNaTela = airplanes.find(a => a.callsign === dadoFresco.callsign);

                if (!aviaoNaTela) {
                    // SE FOR UM AVIÃO NOVO: Só entra no mapa se o feixe bater no ângulo dele
                    let diferencaAngulo = Math.abs(currentSweepGrade - dadoFresco.bearing);
                    if (diferencaAngulo > 180) diferencaAngulo = 360 - diferencaAngulo;

                    if (diferencaAngulo < 4) {
                        dadoFresco.renderBrilho = 15; // Inicia com brilho máximo (flash)
                        airplanes.push(dadoFresco);
                        updateFlightListText();
                    }
                } else {
                    // SE JÁ EXISTE: Calcula colisão com a posição antiga para congelá-lo até o impacto
                    let diferencaAngulo = Math.abs(currentSweepGrade - aviaoNaTela.bearing);
                    if (diferencaAngulo > 180) diferencaAngulo = 360 - diferencaAngulo;

                    if (diferencaAngulo < 4) {
                        // Linha colidiu com ponto antigo! Salta para as coordenadas novas e brilha forte
                        aviaoNaTela.distance = dadoFresco.distance;
                        aviaoNaTela.bearing = dadoFresco.bearing;
                        aviaoNaTela.altitude = dadoFresco.altitude;
                        aviaoNaTela.heading = dadoFresco.heading;
                        aviaoNaTela.renderBrilho = 15; 
                        updateFlightListText();
                    }
                }
            });

            // DESENHO DOS AVIÕES ATIVOS
            airplanes.forEach(plane => {
                const rPixel = (plane.distance / radarRangeKm) * maxRadius;
                const angleRad = (plane.bearing - 90) * Math.PI / 180;
                const x = centerX + rPixel * Math.cos(angleRad);
                const y = centerY + rPixel * Math.sin(angleRad);

                // Efeito fade out do brilho do alvo
                if (!plane.renderBrilho) plane.renderBrilho = 6;
                if (plane.renderBrilho > 6) plane.renderBrilho -= 0.08;

                ctx.fillStyle = '#22c55e';
                ctx.shadowColor = '#22c55e';
                ctx.shadowBlur = plane.renderBrilho * sizeFactor;
                ctx.beginPath();
                ctx.arc(x, y, 5 * sizeFactor, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#4ade80';
                ctx.font = `bold ${Math.round(titleFontSize)}px Courier New`;
                ctx.fillText(plane.callsign, x + (10 * sizeFactor), y - (3 * sizeFactor));
                ctx.fillStyle = '#10b981';
                ctx.font = `bold ${Math.round(baseFontSize)}px Courier New`;
                ctx.fillText(`${plane.altitude}ft`, x + (10 * sizeFactor), y + (9 * sizeFactor));

                // Vetor de Rumo
                const headingRad = (plane.heading - 90) * Math.PI / 180;
                ctx.strokeStyle = 'rgba(34, 197, 94, 0.7)';
                ctx.lineWidth = 1.5 * sizeFactor;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + (15 * sizeFactor) * Math.cos(headingRad), y + (15 * sizeFactor) * Math.sin(headingRad));
                ctx.stroke();
            });

            // Linha de Feixe de Varredura
            ctx.strokeStyle = 'rgba(16, 185, 129, 0.35)';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX + maxRadius * Math.cos(sweepAngle), centerY + maxRadius * Math.sin(sweepAngle));
            ctx.stroke();

            // Velocidade da linha ajustada de forma suave para capturar os alvos perfeitamente
            sweepAngle += 0.010;
            if (sweepAngle > Math.PI * 2) sweepAngle = 0;

            requestAnimationFrame(drawRadar);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Inicialização estável imediata via Worker
        fetchLiveFlightData();
        setInterval(fetchLiveFlightData, 5000); // Consulta o Worker a cada 5 segundos

        drawRadar();
    </script>
</body>
</html>
