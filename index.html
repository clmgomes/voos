<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar ADS-B Real - Versão Web</title>
    <style>
        body {
            background-color: #0d0e11;
            color: #10b981;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #radarContainer {
            position: relative;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
            background: radial-gradient(circle, #0f172a 0%, #020617 100%);
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 50%;
        }
        #info {
            margin-top: 15px;
            font-size: 0.85rem;
            text-align: center;
            max-width: 400px;
            line-height: 1.4;
        }
        .status {
            color: #64748b;
        }
    </style>
</head>
<body>

    <h1>Live Air Traffic Radar</h1>
    <div id="radarContainer">
        <canvas id="radarCanvas" width="400" height="400"></canvas>
    </div>
    <div id="info">
        <div id="apiStatus">Iniciando sistema...</div>
        <div id="flightList" class="status">Aguardando primeira varredura...</div>
    </div>

    <script>
        // CONFIGURAÇÃO DA API AIRLABS
        const AIRLABS_API_KEY = "55baabb7-0d55-4dc0-ad79-da0f76f2be96"; // <-- COLOQUE SUA CHAVE AQUI
        
        const canvas = document.getElementById('radarCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const centerX = width / 2;
        const centerY = height / 2;
        const maxRadius = width / 2;

        // Fallback inicial: Bento Gonçalves
        let myLat = -29.1714; 
        let myLon = -51.5186;
        let radarRangeKm = 60; 
        let locationDetected = false;

        let airplanes = [];
        let sweepAngle = 0;

        // Localização automática por IP
        async function detectLocationByIP() {
            try {
                document.getElementById('apiStatus').innerText = "Detectando sua localização...";
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                if (data.latitude && data.longitude) {
                    myLat = data.latitude;
                    myLon = data.longitude;
                    console.log(`Localização: ${data.city} (${myLat}, ${myLon})`);
                }
            } catch (e) {
                console.error("Usando coordenadas padrão de Bento Gonçalves.", e);
            } finally {
                locationDetected = true;
            }
        }

        async function fetchLiveFlightData() {
            try {
                if (!locationDetected) {
                    await detectLocationByIP();
                }

                document.getElementById('apiStatus').innerText = "Buscando tráfego aéreo local...";

                // URL Direta para a AirLabs
                const urlAirLabs = `https://airlabs.co/api/v9/flights?api_key=${AIRLABS_API_KEY}&lat=${myLat}&lng=${myLon}&distance=${radarRangeKm}`;
                
                // Usamos o proxy do cors-anywhere se a requisição direta falhar, ou tentamos direto com tratamento de erro nativo:
                const response = await fetch(urlAirLabs);
                
                if (!response.ok) {
                    throw new Error(`HTTP erro! Status: ${response.status}`);
                }
                
                const apiData = await response.json();
                
                // Se a API retornar um erro interno (ex: chave inválida ou limite atingido)
                if (apiData.error) {
                    document.getElementById('apiStatus').innerText = `Erro API: ${apiData.error.message}`;
                    return;
                }

                airplanes = [];

                if (apiData && apiData.response && apiData.response.length > 0) {
                    apiData.response.forEach(flight => {
                        if (flight.lat && flight.lng) {
                            const callsign = flight.flight_icao || flight.reg_number || 'UNK';
                            const distance = haversineDistance(myLat, myLon, flight.lat, flight.lng);
                            const bearing = calculateBearing(myLat, myLon, flight.lat, flight.lng);
                            const altitudeFeet = flight.alt || 0;
                            const heading = flight.dir || 0;

                            if (distance <= radarRangeKm) {
                                airplanes.push({ callsign, distance, bearing, altitude: altitudeFeet, heading });
                            }
                        }
                    });
                    document.getElementById('apiStatus').innerText = `Radar Ativo - ${airplanes.length} alvos na região`;
                    updateFlightListText();
                } else {
                    document.getElementById('apiStatus').innerText = "Radar Ativo - Sem tráfego no momento";
                    document.getElementById('flightList').innerText = "Nenhum voo detectado neste raio.";
                }
            } catch (error) {
                console.error("Erro na requisição:", error);
                document.getElementById('apiStatus').innerText = "Erro de conexão/CORS. Verifique o console (F12).";
            }
        }

        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) - Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        function updateFlightListText() {
            if (airplanes.length === 0) return;
            document.getElementById('flightList').innerText = airplanes.map(a => `${a.callsign} (${Math.round(a.distance)}km)`).join(' | ');
        }

        function drawRadar() {
            ctx.fillStyle = 'rgba(2, 6, 23, 0.12)';
            ctx.fillRect(0, 0, width, height);

            ctx.strokeStyle = 'rgba(16, 185, 129, 0.15)';
            ctx.lineWidth = 1;
            for (let r = maxRadius / 4; r <= maxRadius; r += maxRadius / 4) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = 'rgba(16, 185, 129, 0.4)';
                ctx.font = '9px Courier New';
                ctx.fillText(`${Math.round((r / maxRadius) * radarRangeKm)}km`, centerX + 5, centerY - r + 12);
            }

            ctx.beginPath();
            ctx.moveTo(centerX, 0); ctx.lineTo(centerX, height);
            ctx.moveTo(0, centerY); ctx.lineTo(width, centerY);
            ctx.stroke();

            airplanes.forEach(plane => {
                const rPixel = (plane.distance / radarRangeKm) * maxRadius;
                const angleRad = (plane.bearing - 90) * Math.PI / 180;
                const x = centerX + rPixel * Math.cos(angleRad);
                const y = centerY + rPixel * Math.sin(angleRad);

                ctx.fillStyle = '#22c55e';
                ctx.shadowColor = '#22c55e';
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#4ade80';
                ctx.font = 'bold 10px Courier New';
                ctx.fillText(plane.callsign, x + 8, y - 2);
                ctx.fillStyle = '#10b981';
                ctx.font = '8px Courier New';
                ctx.fillText(`${plane.altitude}ft`, x + 8, y + 8);

                const headingRad = (plane.heading - 90) * Math.PI / 180;
                ctx.strokeStyle = 'rgba(34, 197, 94, 0.6)';
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + 12 * Math.cos(headingRad), y + 12 * Math.sin(headingRad));
                ctx.stroke();
            });

            ctx.strokeStyle = 'rgba(16, 185, 129, 0.35)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX + maxRadius * Math.cos(sweepAngle), centerY + maxRadius * Math.sin(sweepAngle));
            ctx.stroke();

            sweepAngle += 0.012;
            if (sweepAngle > Math.PI * 2) sweepAngle = 0;

            requestAnimationFrame(drawRadar);
        }

        // Inicialização básica
        fetchLiveFlightData();
        setInterval(fetchLiveFlightData, 30000); // 30 segundos poupa requisições no GitHub

        drawRadar();
    </script>
</body>
</html>
</html>
